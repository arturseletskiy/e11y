services:
  loki:
    image: grafana/loki:2.9.0
    container_name: e11y_loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-local-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e11y_network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: e11y_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e11y_network

  elasticsearch:
    image: elasticsearch:8.9.0
    container_name: e11y_elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - e11y_network

  redis:
    image: redis:7-alpine
    container_name: e11y_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - e11y_network

  # OpenTelemetry Collector - receives OTLP, exports to debug + Loki
  # HTTP: localhost:4318, gRPC: localhost:4317
  # Usage: docker compose up -d loki otel-collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: e11y_otel_collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - e11y_network

networks:
  e11y_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
