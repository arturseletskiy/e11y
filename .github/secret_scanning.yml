# .github/secret_scanning.yml
#
# Exclude test fixtures and documentation from GitHub Secret Scanning.
#
# These paths contain intentionally-formatted fake API keys (Stripe, etc.)
# used as PII-filtering test data. They are NOT real credentials and pose
# no security risk. All patterns match the shape of real secrets purely to
# exercise the PIIFilter middleware's regex-based masking logic.
#
# See: https://docs.github.com/en/code-security/secret-scanning/
#      customizing-secret-scanning/excluding-information-from-secret-scanning

paths-ignore:
  - "spec/fixtures/**"
  - "docs/integration-tests/**"
