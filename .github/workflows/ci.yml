name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0' # Weekly security scan on Sunday

permissions:
  contents: read

jobs:
  # Best practices applied:
  # 1. Use ruby/setup-ruby with bundler-cache: true (faster gem installs)
  # 2. Add timeout-minutes to prevent stuck jobs
  # 3. Use fail-fast: false for matrix jobs (see all failures)
  # 4. Separate unit and integration tests (fast feedback)
  # 5. Proper service health checks with verbose logging
  # 6. RuboCop Security instead of Brakeman (gem-appropriate security scanning)
  lint:
    name: Lint (Rubocop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Run Rubocop
        run: bundle exec rubocop --parallel

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Run Bundler Audit (check for vulnerable dependencies)
        run: |
          gem install bundler-audit
          bundle audit check --update
      
      - name: Run RuboCop Security Analysis
        run: |
          echo "🔒 Running RuboCop security checks..."
          bundle exec rubocop --only Security,Lint/MixedRegexpCaptureTypes,Lint/SafeNavigationChain \
            --format progress
          echo "✅ Security analysis completed"

  test-unit:
    name: Unit Tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '3.3']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      
      - name: Run unit tests (fast, no Rails/integrations)
        env:
          COVERAGE: true
        run: |
          echo "🧪 Starting unit tests at $(date)"
          bundle exec rspec --tag ~integration --format progress
          echo "✅ Unit tests completed at $(date)"
      
      - name: Upload coverage to Codecov
        if: matrix.ruby == '3.2'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-integration:
    name: Integration Tests (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '3.3']
    services:
      loki:
        image: grafana/loki:2.9.0
        ports:
          - 3100:3100
        options: >-
          --health-cmd "wget --spider -q http://localhost:3100/ready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      prometheus:
        image: prom/prometheus:v2.45.0
        ports:
          - 9090:9090
        options: >-
          --health-cmd "wget --spider -q http://localhost:9090/-/healthy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      elasticsearch:
        image: elasticsearch:8.9.0
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      
      - name: Install system dependencies for integration tests
        run: |
          # netcat is pre-installed on ubuntu-latest
          # If we need redis-cli later, uncomment:
          # sudo apt-get update && sudo apt-get install -y redis-tools
          echo "✅ System dependencies ready"
      
      - name: Install integration dependencies
        run: |
          bundle config set --local with 'integration'
          bundle install
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for Loki..."
          timeout 30 bash -c 'until curl -sf http://localhost:3100/ready; do echo "Loki not ready yet..."; sleep 1; done' || (echo "❌ Loki timeout"; exit 1)
          echo "✅ Loki ready"
          
          echo "Waiting for Prometheus..."
          timeout 30 bash -c 'until curl -sf http://localhost:9090/-/healthy; do echo "Prometheus not ready yet..."; sleep 1; done' || (echo "❌ Prometheus timeout"; exit 1)
          echo "✅ Prometheus ready"
          
          echo "Waiting for Elasticsearch..."
          timeout 60 bash -c 'until curl -sf http://localhost:9200/_cluster/health; do echo "Elasticsearch not ready yet..."; sleep 1; done' || (echo "❌ Elasticsearch timeout"; exit 1)
          echo "✅ Elasticsearch ready"
          
          echo "Waiting for Redis..."
          # Use nc (netcat) instead of redis-cli which is not installed by default
          timeout 30 bash -c 'until nc -z localhost 6379; do echo "Redis not ready yet..."; sleep 1; done' || (echo "❌ Redis timeout"; exit 1)
          echo "✅ Redis ready"
          
          echo "✅ All services ready!"
      
      - name: Run integration tests (Rails, OpenTelemetry, adapters)
        env:
          INTEGRATION: true
          LOKI_URL: http://localhost:3100
          PROMETHEUS_URL: http://localhost:9090
          ELASTICSEARCH_URL: http://localhost:9200
          REDIS_URL: redis://localhost:6379
        run: |
          echo "🧪 Starting integration tests at $(date)"
          timeout 5m bundle exec rspec --tag integration --format documentation --profile 10 || (echo "⚠️ Integration tests timeout or failed at $(date)"; exit 1)
          echo "✅ Integration tests completed at $(date)"
      
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-ruby-${{ matrix.ruby }}
          path: tmp/rspec_results.xml
          if-no-files-found: ignore

  build:
    name: Build Gem
    runs-on: ubuntu-latest
    needs: [lint, security, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Build gem
        run: gem build e11y.gemspec
      
      - name: Verify gem
        run: |
          gem spec e11y-*.gem
          ls -lh e11y-*.gem
